<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
	rel="stylesheet" />
<style>
body {
	background-color: #fffaf3;
	font-family: "Segoe UI", sans-serif;
}

h2 {
	color: #cd853f;
	font-weight: 600;
	margin: 30px 0;
	text-align: center;
}

.user-card {
	background-color: #fff3e0;
	padding: 20px;
	border-radius: 12px;
	margin-bottom: 20px;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.07);
	cursor: pointer;
	transition: transform 0.2s ease;
}

.user-card:hover {
	transform: scale(1.02);
}

.journals-section {
	display: none;
	padding: 15px;
	margin-top: 10px;
	background-color: #f7e7d4;
	border-radius: 10px;
}

.journal-entry {
	padding: 10px;
	margin-bottom: 10px;
	background-color: #fff;
	border-radius: 8px;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}

.journal-entry h6 {
	font-weight: 600;
	margin-bottom: 4px;
	color: #3a2f2f;
}

.btn-danger, .btn-outline-danger {
	font-size: 0.85em;
	border-radius: 20px;
	padding: 4px 10px;
}
.btn-peru {
      background-color: #cd853f;
      color: white;
      border: none;
      font-size: 0.85em;
      border-radius: 20px;
      padding: 4px 10px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-peru:hover {
      background-color: #d38c5f;
      box-shadow: 0 0 10px rgba(205, 133, 63, 0.3);
    }
</style>
</head>
<body>

	<nav class="navbar navbar-expand-lg shadow-sm"
		style="background-color: #fff3e0;">
		<div class="container-fluid">
			<a class="navbar-brand" href="#"
				style="color: #cd853f; font-weight: 600;">Daily Journal</a>

		
			
			<div class="d-flex align-items-center gap-3">
				<form th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-outline-danger">
						<i class="bi bi-box-arrow-right me-1"></i> Logout
					</button>
				</form>
			</div>
		</div>
	</nav>
	<div class="container mt-5">
		<h2>
			<i class="bi bi-person-fill me-2"></i> Registered Users
		</h2>

		<div th:each="user : ${users}" class="user-card"
			th:onclick="'toggleJournals(\'journals-' + ${user.id} + '\')'">
			<div class="d-flex justify-content-between align-items-center">
				<div>
					<h5 th:text="${user.name}">User Name</h5>
					<p th:text="${user.email}">student@email.com</p>
				</div>
				<form th:action="@{/admin/delete-user}" method="post">
					<input type="hidden" name="id" th:value="${user.id}" />
					<button type="submit"
					        class="btn btn-sm btn-outline-danger"
					        onclick="return confirm('Are you sure you want to delete this user? This action cannot be undone.')">
					    <i class="bi bi-trash-fill me-1"></i> Delete User
					</button>

				</form>
			</div>

			<div th:id="'journals-' + ${user.id}" class="journals-section">
				<div th:if="${#lists.isEmpty(user.journals)}"
					class="text-muted fst-italic">
					<i class="bi bi-journal-x me-1"></i> No journals found.
				</div>

				<div th:each="journal : ${user.journals}" class="journal-entry">
					<h6 th:text="${journal.title}">Journal Title</h6>
					<small
						th:text="${#temporals.format(journal.createdAt, 'dd MMM yyyy • HH:mm')}">Timestamp</small>
					<p th:text="${#strings.abbreviate(journal.content, 180)}">Journal
						preview...</p>

					<div class="d-flex gap-2 mt-2">
						<a th:href="@{'/journals/views/' + ${journal.id}}"
							class="btn btn-sm btn-peru"> <i class="bi bi-eye-fill me-1"></i>
							View Journal
						</a>
						<form th:action="@{/admin/delete-journal}" method="post">
							<input type="hidden" name="id" th:value="${journal.id}" />
							<button type="submit"
							        class="btn btn-sm btn-danger"
							        onclick="return confirm('Are you sure you want to delete this journal? This action cannot be undone.')">
							    <i class="bi bi-trash-fill me-1"></i> Delete Journal
							</button>

						</form>
					</div>
				</div>

			</div>
		</div>
	</div>

	<script>
  function toggleJournals(id) {
    document.querySelectorAll('.journals-section').forEach(el => {
      el.style.display = el.id === id ? (el.style.display === 'none' || el.style.display === '' ? 'block' : 'none') : 'none';
    });
  }
</script>

</body>
</html>
