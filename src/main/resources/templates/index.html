<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Journal</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .bg-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .bg-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .content {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 8em;
            margin-bottom: 15px;
            font-family: Copperplate;
            color: #8b4513;
        }

		.button-row {
		            display: flex;
		            justify-content: center;
		            gap: 30px;
		            flex-wrap: wrap;
		        }

		        .btn-brown {
		            padding: 14px 28px;
		            font-size: 1.2em;
		            background-color: #8B4513; /* SaddleBrown */
		            border: none;
		            border-radius: 8px;
		            text-decoration: none;
		            color: #fff;
		            transition: background-color 0.3s ease;
		        }

		        .btn-brown:hover {
		            background-color: #A0522D; /* Lighter brown */
		        }
    </style>
</head>
<body>
    <div class="bg-wrapper">
        <img src="/images/background.jpg" alt="Background Image">
        <div class="content">
            <h1>Daily Journal</h1>
            
			<div class="button-row">
			            <a th:href="@{/login}" class="btn-brown">Login</a>
			            <a th:href="@{/register}" class="btn-brown">Sign Up</a>
			        </div>
        </div>
    </div>
</body>
</html>
