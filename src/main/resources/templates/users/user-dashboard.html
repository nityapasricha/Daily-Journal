 <!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Journals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #fffaf3;
      font-family: "Segoe UI", sans-serif;
    }

    h2 {
      color: #cd853f;
      font-weight: 600;
      margin-top: 50px;
      text-align: center;
    }

    .posts-container {
      margin-top: 50px;
	  margin-bottom:70px;
      display: flex;
      flex-direction: column;
      gap: 100px;
    }

    .post {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .posts-container .post:nth-child(odd) {
      flex-direction: row-reverse;
    }

    .post-img {
      flex: 2;
      position: relative;
    }

    .post-img::after {
      content: "";
      width: 100%;
      height: 100%;
      background-color: #f1dcc3;
      position: absolute;
      top: 20px;
      left: -20px;
      z-index: -1;
      border-radius: 12px;
    }

    .post-img img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(205, 133, 63, 0.25);
      transition: box-shadow 0.3s ease;
    }

    .post-img img:hover {
      box-shadow: 0 12px 32px rgba(205, 133, 63, 0.35);
    }

    .post-content {
      flex: 3;
      padding-top: 10px;
    }

    .post-content h1 {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 5px;
      color: #3a2f2f;
      font-family: 'Segoe UI Semibold', sans-serif;
      letter-spacing: 0.5px;
    }

    .post-content small {
      font-size: 13px;
      color: #aa7c4f;
      display: block;
      margin-bottom: 10px;
      font-style: italic;
    }

    .post-content p {
      font-size: 16px;
      color: #5a4a4a;
      line-height: 1.7;
      margin-bottom: 15px;
    }

    .btn-peru {
      background-color: #cd853f;
      color: white;
      border: none;
      font-weight: 600;
      font-size: 1em;
      border-radius: 20px;
      padding: 8px 16px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-peru:hover {
      background-color: #d38c5f;
      box-shadow: 0 0 10px rgba(205, 133, 63, 0.3);
    }

    @media (max-width: 768px) {
      .post {
        flex-direction: column !important;
      }
      .post-img::after {
        display: none;
      }
    }
	
	@media (max-width: 992px) {
	  .search-wrapper {
	    flex-direction: column;
	    align-items: stretch;
	  }

	  .navbar .btn-outline-peru,
	  .navbar .dropdown-toggle {
	    font-size: 20px;
	    padding: 6px 10px;
	  }

	  .navbar-brand {
	    font-size: 20px;
	  }
	}
	
	/* Override Bootstrap default blue active page styling */
	.pagination .page-item.active .page-link {
	  background-color: #ffe8d0 !important; /* soft peach theme */
	  border-color: #cd853f !important;
	  color: #3a2f2f !important;
	  font-weight: bold;
	  border-radius: 20px;
	}

	/* Non-active buttons get the same tone */
	.pagination .page-link {
	  color: #cd853f;
	  border: 1px solid #cd853f;
	  border-radius: 20px;
	  padding: 6px 12px;
	  transition: all 0.3s ease;
	}

	/* Hover effect */
	.pagination .page-link:hover {
	  background-color: #faebd7;
	  box-shadow: 0 0 6px rgba(205, 133, 63, 0.2);
	  color: #5a3e1b;
	}


  </style>
</head>
<div>


  
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg shadow-sm py-3" style="background-color: #fff3e0;">
    <div class="container-fluid align-items-center justify-content-between px-4">

      <a class="navbar-brand" th:href="@{/users/dashboard}" style="color: #cd853f; font-weight: 600; font-size: 22px;">Daily Journal</a>

      
      <form class="d-flex mx-auto" role="search" style="width: 55%;" th:action="@{/users/search}" method="get">
        <input class="form-control me-2" type="text" name="keyword"
               placeholder="Search by title or tag..." aria-label="Search">
        <button class="btn btn-peru" type="submit">Search</button>
      </form>

      
      <div class="d-flex align-items-center gap-3">

        
        <button class="btn btn-outline-peru" type="button" data-bs-toggle="collapse"
                data-bs-target="#filterPanel" aria-expanded="false" title="Filter by Date">
          <i class="bi bi-calendar-range" style="font-size: 22px;"></i>
        </button>

        
        <a href="/journals" class="btn btn-outline-peru" title="Create Journal">
          <i class="bi bi-journal-plus" style="font-size: 22px;"></i>
        </a>

        <!-- Profile Dropdown -->
        <div class="dropdown">
          <a href="#" data-bs-toggle="dropdown" title="Profile">
            <i class="bi bi-person-circle" style="color: #cd853f; font-size: 22px;"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end p-3" style="min-width: 250px; border-radius: 12px;">
            <li class="mb-2" style="color: #8B4513;">
              Hello, <span th:text="${user.name}" style="font-weight: 600;"></span>
            </li>
            <li class="mb-2"><i class="bi bi-envelope-fill me-2 text-peru"></i> <span th:text="${user.email}"></span></li>
            <li class="mb-2"><i class="bi bi-person-badge-fill me-2 text-peru"></i> <span th:text="${user.role}"></span></li>
            <li><a class="dropdown-item" th:href="@{/users/profile}"><i class="bi bi-person-lines-fill me-2"></i> View Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post">
                <button class="dropdown-item" type="submit">
                  <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  
  
  <div class="collapse mt-3" id="filterPanel">
    <form th:action="@{/users/filter}" method="get" class="container d-flex justify-content-center gap-3">
      <input class="form-control" type="date" name="startDate" title="Start Date" style="max-width: 200px;">
      <input class="form-control" type="date" name="endDate" title="End Date" style="max-width: 200px;">
      <button class="btn btn-peru" type="submit"><i class="bi bi-calendar-check me-1"></i> Apply</button>
    </form>
  </div>

  

  <!--Navbar ends here-->
  
  <div class="text-center mt-4 mb-5">
    <h1 style="
      font-family: 'Pacifico', cursive;
      font-size: 36px;
      color: #cd853f;
      text-shadow: 2px 2px 6px rgba(205,133,63,0.2);
    ">
      Welcome <span th:text="${user.name}">User</span> 🌼
    </h1>
  </div>

  
  <!--Journal Posts Section -->
  <div class="container posts-container">

	<div th:if="${#lists.isEmpty(journals)}" class="text-center text-muted" style="margin-top: 80px;">
	  <i class="bi bi-journal-x" style="font-size: 50px; color: #cd853f;"></i>
	  <h4 class="mt-3" style="color: #3a2f2f;">No journals yet</h4>
	  <p style="font-size: 15px;">Your reflections, memories, and stories will appear here once you publish your first journal.</p>
	  <a href="/journals" class="btn btn-peru mt-3"><i class="bi bi-journal-plus me-1"></i> Create Journal</a>
	</div>

	
    <div th:each="journal : ${journals}" class="post">
      <div class="post-img">
        <img th:src="@{'/uploads/' + ${journal.img}}" alt="Journal Image">
      </div>
      <div class="post-content">
        <h1 th:text="${journal.title}">Journal Title</h1>
        <small th:text="${#temporals.format(journal.createdAt, 'dd MMM yyyy • HH:mm')}">24 Jul 2025 • 14:32</small>
        <p th:text="${#strings.abbreviate(journal.content, 200)}">Short preview of content...</p>
        <a th:href="@{'/journals/view/' + ${journal.id}}" class="btn-peru">View Journal</a>
      </div>
	  
    </div>
  </div>
  <div th:if="${totalPages > 1}">
  <ul class="pagination justify-content-center" style="gap: 12px;">
    
    <!-- Left Arrow -->
    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
      <a class="page-link" th:href="@{/users/dashboard(page=${currentPage - 1})}">
        <i class="bi bi-arrow-left-circle-fill fs-5"></i>
      </a>
    </li>

    <!-- Show page numbers only if journals exist -->
	<th:block th:if="${!#lists.isEmpty(journals)}">
	  <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
	      th:classappend="${i == currentPage} ? 'active'">
	    <a class="page-link" th:href="@{/users/dashboard(page=${i})}" th:text="${i + 1}"></a>
	  </li>
	</th:block>

    <!-- Right Arrow -->
    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
      <a class="page-link" th:href="@{/users/dashboard(page=${currentPage + 1})}">
        <i class="bi bi-arrow-right-circle-fill fs-5"></i>
      </a>
    </li>
    
  </ul>
</div>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
