<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>View Journal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #fffaf3;
      font-family: "Segoe UI", sans-serif;
      padding-bottom: 80px;
    }

    .container {
      max-width: 900px;
      margin-top: 80px;
    }

	.journal-img {
	  background-color: #fdf5eb;
	  padding: 12px;
	  border-radius: 15px;
	  box-shadow: 0 6px 18px rgba(205, 133, 63, 0.12);
	  margin-bottom: 30px;
	  margin-top:-4%;
	}


    .journal-img img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 25px;
      box-shadow: 0 8px 24px rgba(205, 133, 63, 0.25);

    }

    .author-name {
      font-size: 16px;
      color: #5a4a4a;
      margin-top: 10px;
      font-style: italic;
    }

    h1 {
      font-size: 34px;
      color: #3a2f2f;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .timestamp {
      font-size: 14px;
      color: #aa7c4f;
      font-style: italic;
      margin-bottom: 20px;
    }

    .content {
      font-size: 17px;
      line-height: 1.8;
      color: #4d3d3d;
      margin-bottom: 40px;
      white-space: pre-wrap;
    }

    .action-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-peru {
      background-color: #cd853f;
      color: white;
      border: none;
      font-weight: 600;
      font-size: 1em;
      border-radius: 20px;
      padding: 10px 20px;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-peru:hover {
      background-color: #d38c5f;
      box-shadow: 0 0 10px rgba(205, 133, 63, 0.3);
    }

    @media (max-width: 768px) {
      .journal-img::after {
        display: none;
      }
    }
  </style>
</head>
<body>

	<h2 class="text-center" style="margin-top: 50px; color: #cd853f; font-weight: 600;">
	  A Moment in Focus
	</h2>

  <div class="container">
    <!-- Journal Image -->
    <div class="journal-img">
      <img th:src="@{'/uploads/' + ${journal.img}}" alt="Journal Image">
      <div class="author-name">Posted by <span th:text="${journal.user.name}">Author Name</span></div>
    </div>

    
    <h1 th:text="${journal.title}">Journal Title</h1>
    <div class="timestamp" th:text="${#temporals.format(journal.createdAt, 'dd MMM yyyy • HH:mm')}">24 Jul 2025 • 14:32</div>

    <div class="content" th:text="${journal.content}">Full journal content goes here...</div>

    
    <div class="action-buttons">
      

      <form th:action="@{'/journals/delete-admin/' + ${journal.id}}" method="post" style="display:inline;">
        <button type="submit" class="btn-peru"><i class="bi bi-trash3 me-1"></i> Delete Journal</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
