<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>No Journals Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #fffaf3;
      font-family: "Segoe UI", sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    .empty-wrapper {
      max-width: 700px;
      margin: 0 auto;
      background-color: #fff7ea;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(205, 133, 63, 0.15);
    }

    .empty-wrapper i {
      font-size: 120px;
      color: #cd853f;
      margin-top:2px;

    }

    .empty-wrapper h2 {
      font-size: 28px;
      color: #3a2f2f;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .empty-wrapper p {
      font-size: 16px;
      color: #6e5344;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .btn-peru {
      background-color: #cd853f;
      color: white;
      border: none;
      font-weight: 600;
      font-size: 1em;
      border-radius: 20px;
      padding: 10px 20px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-peru:hover {
      background-color: #d38c5f;
      box-shadow: 0 0 10px rgba(205, 133, 63, 0.3);
    }
  </style>
</head>
<body>

  <div class="empty-wrapper">
    <i class="bi bi-calendar-x"></i>
    <h2>No Journals Found</h2>
    <p>We couldn't find any entries within the selected date range.<br>Try expanding your filter, or revisit the dashboard to explore more moments.</p>

	<a href="/users/dashboard" class="btn btn-peru mt-3 d-inline-flex align-items-center justify-content-center gap-2"
	   style="padding: 10px 20px; font-size: 1em;">
	  <i class="bi bi-arrow-left" style="font-size: 22px; color: white;font-weight:700;"></i>
	  <span style="color: white;">Back to Dashboard</span>
	</a>



  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
